events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # HTTP -> HTTPS redirect + certbot
    server {
        listen 80;
        server_name smartme.life app.smartme.life;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — smartme.life (landing page, static)
    server {
        listen 443 ssl;
        http2 on;
        server_name smartme.life;

        ssl_certificate /etc/letsencrypt/live/smartme/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smartme/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root /srv/landing;
        index index.html;

        # Cache static assets
        location /icons/ {
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }

    # HTTPS — app.smartme.life (anelka web app)
    server {
        listen 443 ssl;
        http2 on;
        server_name app.smartme.life;

        ssl_certificate /etc/letsencrypt/live/smartme/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smartme/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
