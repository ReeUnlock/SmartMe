<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Anelka</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        font-family: 'Inter', sans-serif;
        height: 100%;
        height: 100dvh;
        -webkit-text-size-adjust: 100%;
      }
      html {
        overflow: hidden;
        /* Prevent iOS rubber-band bounce on the whole page */
        position: fixed;
        width: 100%;
      }
      body {
        overflow: hidden;
        overscroll-behavior-y: none;
        /* Prevent iOS double-tap zoom */
        touch-action: manipulation;
      }
      #root {
        overflow: hidden;
        height: 100%;
      }
      /* iOS auto-zoom prevention: inputs below 16px trigger Safari zoom */
      @supports (-webkit-touch-callout: none) {
        input, textarea, select {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
