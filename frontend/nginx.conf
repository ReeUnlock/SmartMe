server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache forever
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Icons and static — long cache
    location /icons/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache (ensures fresh chunk references)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — also no-cache since it serves index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
