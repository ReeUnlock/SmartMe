services:
  db:
    image: postgres:16-alpine
    container_name: anelka-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: anelka-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: anelka-frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: anelka-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
      - ./landing:/srv/landing:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads:
  certbot-webroot:
  certbot-certs:
