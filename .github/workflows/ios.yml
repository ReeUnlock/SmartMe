name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: iOS Build Validation
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (capacitor)
        working-directory: frontend
        run: npx vite build --mode capacitor
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: smartme@${{ github.sha }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: Resolve Swift packages
        working-directory: frontend/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      # ─── Unsigned build validation ───
      # This builds the project without code signing to validate
      # that the Swift/ObjC code compiles and links correctly.
      # A real signed build requires secrets (see signed-build job).
      - name: Build iOS (unsigned validation)
        working-directory: frontend/ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20

  # ─── Signed release build (runs only when secrets are configured) ───
  # To enable this job, add the following GitHub repository secrets:
  #
  #   IOS_CERTIFICATE_P12_BASE64
  #     Base64-encoded .p12 distribution certificate
  #     Generate: base64 -i Certificates.p12 | pbcopy
  #
  #   IOS_CERTIFICATE_PASSWORD
  #     Password for the .p12 certificate
  #
  #   IOS_PROVISION_PROFILE_BASE64
  #     Base64-encoded .mobileprovision file
  #     Generate: base64 -i SmartMe.mobileprovision | pbcopy
  #
  #   IOS_KEYCHAIN_PASSWORD
  #     Arbitrary password for the temporary CI keychain
  #     (any random string, e.g. from: openssl rand -hex 16)
  #
  #   IOS_TEAM_ID
  #     Apple Developer Team ID (10-char alphanumeric)
  #
  # Optional (for App Store upload):
  #   APPSTORE_API_KEY_ID        — App Store Connect API key ID
  #   APPSTORE_API_ISSUER_ID     — App Store Connect issuer ID
  #   APPSTORE_API_KEY_BASE64    — Base64-encoded .p8 private key

  ios-signed-build:
    name: iOS Signed Build
    runs-on: macos-latest
    needs: ios-build
    timeout-minutes: 30
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.IOS_SIGNING_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (capacitor)
        working-directory: frontend
        run: npx vite build --mode capacitor
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: smartme@${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: smartme@${{ github.sha }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          KC_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KC_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security list-keychains -d user -s "$KC_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Install to standard location
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$PROFILE_PATH"))
          cp "$PROFILE_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"

      - name: Resolve Swift packages
        working-directory: frontend/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build signed archive
        working-directory: frontend/ios/App
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/SmartMe.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA
        working-directory: frontend/ios/App
        run: |
          # Create export options plist
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SmartMe.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa-output

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
